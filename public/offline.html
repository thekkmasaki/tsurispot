<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>オフライン | ツリスポ</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
        text-align: center;
        background: #f0f9ff;
        color: #0f172a;
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
          "Noto Sans JP", sans-serif;
        -webkit-text-size-adjust: 100%;
      }
      .icon {
        width: 72px;
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        border-radius: 20px;
        background: #e0f2fe;
      }
      h1 {
        font-size: 19px;
        font-weight: 700;
      }
      p {
        font-size: 14px;
        line-height: 1.7;
        color: #475569;
        max-width: 280px;
      }
      button {
        margin-top: 4px;
        border: none;
        border-radius: 10px;
        background: #0369a1;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        padding: 12px 28px;
        cursor: pointer;
      }
      button:active {
        background: #075985;
      }
      .brand {
        margin-top: 8px;
        font-size: 12px;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="icon">🎣</div>
    <h1>オフラインです</h1>
    <p>
      インターネットに接続できませんでした。<br />
      電波の良い場所で「再読み込み」をお試しください。
    </p>
    <button onclick="location.replace('https://tsurispot.com/')">
      再読み込み
    </button>
    <div class="brand">ツリスポ</div>
  </body>
</html>
