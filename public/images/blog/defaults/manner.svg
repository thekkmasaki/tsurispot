  <!-- Waves -->
  <path d="M0,320 Q100,305 200,320 Q300,335 400,320 Q500,305 600,320 Q700,335 800,320 L800,400 L0,400Z" fill="#f59e0b" opacity="0.15"/>
  <text x="400" y="278" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="#b45309" opacity="0.5">MANNER &amp; RULES</text>
  <text x="400" y="303" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#d97706" opacity="0.4">tsurispot.com</text>
