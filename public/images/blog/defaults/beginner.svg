<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Water waves -->
  <path d="M0,320 Q100,300 200,320 Q300,340 400,320 Q500,300 600,320 Q700,340 800,320 L800,400 L0,400Z" fill="#60a5fa" opacity="0.3"/>
  <path d="M0,340 Q100,320 200,340 Q300,360 400,340 Q500,320 600,340 Q700,360 800,340 L800,400 L0,400Z" fill="#3b82f6" opacity="0.2"/>
  <!-- Open book icon -->
  <g transform="translate(400,170)" opacity="0.6">
    <path d="M-60,-40 L-60,40 Q-30,30 0,40 L0,-40 Q-30,-50 -60,-40Z" fill="#2563eb" opacity="0.4"/>
    <path d="M60,-40 L60,40 Q30,30 0,40 L0,-40 Q30,-50 60,-40Z" fill="#2563eb" opacity="0.4"/>
    <path d="M-60,-40 L-60,40 Q-30,30 0,40 L0,-40 Q-30,-50 -60,-40Z" fill="none" stroke="#1d4ed8" stroke-width="2"/>
    <path d="M60,-40 L60,40 Q30,30 0,40 L0,-40 Q30,-50 60,-40Z" fill="none" stroke="#1d4ed8" stroke-width="2"/>
    <!-- Lines on book -->
    <line x1="-45" y1="-20" x2="-10" y2="-25" stroke="#1d4ed8" stroke-width="1.5" opacity="0.4"/>
    <line x1="-45" y1="-5" x2="-10" y2="-10" stroke="#1d4ed8" stroke-width="1.5" opacity="0.4"/>
    <line x1="-45" y1="10" x2="-10" y2="5" stroke="#1d4ed8" stroke-width="1.5" opacity="0.4"/>
    <line x1="45" y1="-20" x2="10" y2="-25" stroke="#1d4ed8" stroke-width="1.5" opacity="0.4"/>
    <line x1="45" y1="-5" x2="10" y2="-10" stroke="#1d4ed8" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Rod illustration -->
  <g transform="translate(400,170)" opacity="0.3">
    <line x1="80" y1="-60" x2="130" y2="-100" stroke="#1d4ed8" stroke-width="2"/>
    <path d="M130,-100 Q150,-85 140,-70" fill="none" stroke="#1d4ed8" stroke-width="1.5"/>
  </g>
  <text x="400" y="280" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="#1d4ed8" opacity="0.5">BEGINNER'S GUIDE</text>
  <text x="400" y="305" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#3b82f6" opacity="0.4">tsurispot.com</text>
</svg>