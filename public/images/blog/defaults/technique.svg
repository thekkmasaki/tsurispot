<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e8ff"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Target/crosshair -->
  <g transform="translate(400,160)" opacity="0.4">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#7c3aed" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#7c3aed" opacity="0.5"/>
    <line x1="0" y1="-60" x2="0" y2="-50" stroke="#7c3aed" stroke-width="2"/>
    <line x1="0" y1="60" x2="0" y2="50" stroke="#7c3aed" stroke-width="2"/>
    <line x1="-60" y1="0" x2="-50" y2="0" stroke="#7c3aed" stroke-width="2"/>
    <line x1="60" y1="0" x2="50" y2="0" stroke="#7c3aed" stroke-width="2"/>
  </g>
  <!-- Rod with cast line -->
  <g transform="translate(400,160)" opacity="0.25">
    <line x1="80" y1="40" x2="160" y2="-60" stroke="#7c3aed" stroke-width="2.5"/>
    <path d="M160,-60 Q180,-30 170,10 Q160,50 140,80" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>
  <!-- Fish silhouette -->
  <g transform="translate(320,120)" opacity="0.2">
    <path d="M0,0 Q-15,-10 -25,0 Q-15,10 0,0Z" fill="#7c3aed"/>
    <ellipse cx="10" cy="0" rx="20" ry="10" fill="#7c3aed"/>
    <circle cx="22" cy="-3" r="2" fill="#f3e8ff"/>
  </g>
  <!-- Water -->
  <path d="M0,330 Q100,315 200,330 Q300,345 400,330 Q500,315 600,330 Q700,345 800,330 L800,400 L0,400Z" fill="#8b5cf6" opacity="0.12"/>
  <text x="400" y="278" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="#7c3aed" opacity="0.5">TECHNIQUE</text>
  <text x="400" y="303" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#8b5cf6" opacity="0.4">tsurispot.com</text>
</svg>