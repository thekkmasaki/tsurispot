<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffedd5"/>
      <stop offset="100%" style="stop-color:#fdba74"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Tackle box shape -->
  <g transform="translate(400,165)" opacity="0.5">
    <rect x="-55" y="-35" width="110" height="70" rx="6" fill="#ea580c" opacity="0.3"/>
    <rect x="-55" y="-35" width="110" height="70" rx="6" fill="none" stroke="#c2410c" stroke-width="2.5"/>
    <line x1="-55" y1="-5" x2="55" y2="-5" stroke="#c2410c" stroke-width="1.5"/>
    <rect x="-15" y="-42" width="30" height="10" rx="3" fill="none" stroke="#c2410c" stroke-width="2"/>
    <!-- Compartments -->
    <line x1="-18" y1="-5" x2="-18" y2="35" stroke="#c2410c" stroke-width="1" opacity="0.5"/>
    <line x1="18" y1="-5" x2="18" y2="35" stroke="#c2410c" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Rod silhouette -->
  <g transform="translate(400,165)" opacity="0.25">
    <line x1="80" y1="30" x2="200" y2="-80" stroke="#c2410c" stroke-width="2.5"/>
    <circle cx="80" cy="30" r="10" fill="none" stroke="#c2410c" stroke-width="2"/>
  </g>
  <!-- Hook -->
  <g transform="translate(320,120)" opacity="0.3">
    <path d="M0,0 L0,20 Q0,35 10,35 Q20,35 20,25 L20,15" fill="none" stroke="#c2410c" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="2" fill="#c2410c"/>
  </g>
  <text x="400" y="278" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="#c2410c" opacity="0.5">GEAR &amp; TACKLE</text>
  <text x="400" y="303" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ea580c" opacity="0.4">tsurispot.com</text>
</svg>