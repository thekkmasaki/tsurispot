<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F0FF"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2E6EB5"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="250" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="650" cy="80" r="40" fill="#FFD93D" opacity="0.9"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="70" rx="60" ry="25" fill="white" opacity="0.7"/>
  <ellipse cx="240" cy="60" rx="50" ry="20" fill="white" opacity="0.7"/>
  <!-- Sea -->
  <rect y="250" width="800" height="200" fill="url(#sea)"/>
  <!-- Waves -->
  <path d="M0 280 Q50 270 100 280 Q150 290 200 280 Q250 270 300 280 Q350 290 400 280 Q450 270 500 280 Q550 290 600 280 Q650 270 700 280 Q750 290 800 280 V450 H0Z" fill="#3B82C4" opacity="0.5"/>
  <!-- Breakwater / Tetrapods -->
  <rect x="100" y="200" width="500" height="50" fill="#8B8B8B" rx="3"/>
  <rect x="100" y="195" width="500" height="10" fill="#9E9E9E" rx="2"/>
  <!-- Tetrapods -->
  <g fill="#7A7A7A">
    <path d="M80 250 L95 220 L110 250 L95 240Z"/>
    <path d="M60 260 L75 230 L90 260 L75 250Z"/>
    <path d="M610 250 L625 220 L640 250 L625 240Z"/>
    <path d="M630 260 L645 230 L660 260 L645 250Z"/>
  </g>
  <!-- Railing -->
  <g stroke="#666" stroke-width="2">
    <line x1="120" y1="195" x2="120" y2="175"/>
    <line x1="200" y1="195" x2="200" y2="175"/>
    <line x1="280" y1="195" x2="280" y2="175"/>
    <line x1="360" y1="195" x2="360" y2="175"/>
    <line x1="440" y1="195" x2="440" y2="175"/>
    <line x1="520" y1="195" x2="520" y2="175"/>
    <line x1="120" y1="175" x2="520" y2="175"/>
  </g>
  <!-- Fishing person silhouette -->
  <g fill="#4A4A4A">
    <circle cx="350" cy="160" r="8"/>
    <rect x="346" y="168" width="8" height="20" rx="2"/>
    <line x1="350" y1="170" x2="340" y2="182" stroke="#4A4A4A" stroke-width="3" stroke-linecap="round"/>
    <line x1="350" y1="170" x2="360" y2="182" stroke="#4A4A4A" stroke-width="3" stroke-linecap="round"/>
    <line x1="346" y1="188" x2="340" y2="200" stroke="#4A4A4A" stroke-width="3" stroke-linecap="round"/>
    <line x1="354" y1="188" x2="360" y2="200" stroke="#4A4A4A" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Fishing rod -->
  <line x1="360" y1="175" x2="430" y2="120" stroke="#6B4423" stroke-width="2"/>
  <line x1="430" y1="120" x2="430" y2="300" stroke="#AAA" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Text -->
  <text x="400" y="400" text-anchor="middle" fill="white" font-family="sans-serif" font-size="24" font-weight="bold" opacity="0.8">堤防釣り</text>
</svg>