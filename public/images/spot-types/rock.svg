<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5DADE2"/>
      <stop offset="100%" stop-color="#AED6F1"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A5276"/>
      <stop offset="100%" stop-color="#2471A3"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="220" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="600" cy="60" rx="50" ry="20" fill="white" opacity="0.6"/>
  <ellipse cx="640" cy="50" rx="40" ry="18" fill="white" opacity="0.6"/>
  <!-- Sea -->
  <rect y="220" width="800" height="230" fill="url(#sea)"/>
  <!-- Waves crashing on rocks -->
  <path d="M0 260 Q40 250 80 260 Q120 270 160 260 Q200 250 240 260 Q280 270 320 260 Q360 250 400 260 Q440 270 480 260 Q520 250 560 260 Q600 270 640 260 Q680 250 720 260 Q760 270 800 260 V450 H0Z" fill="#1A5276" opacity="0.5"/>
  <!-- Rocky shore -->
  <polygon points="0,300 50,250 120,270 180,230 250,260 300,220 350,250 380,230 400,250 400,450 0,450" fill="#5D6D7E"/>
  <polygon points="0,320 60,280 130,300 200,260 270,290 320,260 370,280 400,270 400,450 0,450" fill="#4A5568"/>
  <!-- Rock details -->
  <polygon points="100,280 130,260 160,280 130,290" fill="#6B7B8D" opacity="0.5"/>
  <polygon points="200,270 240,245 270,275 235,285" fill="#6B7B8D" opacity="0.5"/>
  <!-- Splash / wave on rocks -->
  <g fill="white" opacity="0.7">
    <ellipse cx="280" cy="250" rx="15" ry="8"/>
    <ellipse cx="150" cy="265" rx="12" ry="6"/>
    <circle cx="320" cy="240" r="4"/>
    <circle cx="290" cy="238" r="3"/>
    <circle cx="160" cy="255" r="3"/>
  </g>
  <!-- Fishing person on rocks -->
  <g fill="#4A4A4A">
    <circle cx="300" cy="210" r="7"/>
    <rect x="296" y="217" width="8" height="16" rx="2"/>
    <line x1="300" y1="220" x2="290" y2="230" stroke="#4A4A4A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="300" y1="220" x2="310" y2="230" stroke="#4A4A4A" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Fishing rod -->
  <line x1="310" y1="215" x2="420" y2="160" stroke="#6B4423" stroke-width="2"/>
  <line x1="420" y1="160" x2="450" y2="280" stroke="#AAA" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Text -->
  <text x="600" y="400" text-anchor="middle" fill="white" font-family="sans-serif" font-size="24" font-weight="bold" opacity="0.8">磯釣り</text>
</svg>