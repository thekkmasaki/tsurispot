<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    font-family: 'Noto Sans JP', sans-serif;
    overflow: hidden;
    position: relative;
    color: white;
  }

  /* AI写真プレースホルダー */
  .photo-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 40% 40%, #1a6b4a 0%, transparent 50%),
      radial-gradient(ellipse at 60% 70%, #0a3d6b 0%, transparent 50%),
      linear-gradient(180deg, #0a1f1a 0%, #0d2b3e 50%, #050d14 100%);
    filter: saturate(1.2);
  }
  .photo-bg::after {
    content: '※Gemini生成の迫力ある魚の写真';
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    color: rgba(255,255,255,0.12);
    white-space: nowrap;
  }

  .gradient-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg,
      rgba(0,0,0,0.6) 0%,
      rgba(0,0,0,0.1) 25%,
      rgba(0,0,0,0.1) 50%,
      rgba(0,0,0,0.7) 80%,
      rgba(0,0,0,0.95) 100%
    );
  }

  .grain {
    position: absolute;
    inset: 0;
    opacity: 0.05;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  /* 上部: 煽りテキスト */
  .top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 2;
    padding: 64px 72px 0;
  }
  .hook {
    font-size: 96px;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -3px;
    text-shadow: 0 4px 40px rgba(0,0,0,0.6);
  }
  .hook .em {
    color: #4ade80;
    text-shadow: 0 0 50px rgba(74,222,128,0.3);
  }
  .hook-sub {
    font-size: 32px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    margin-top: 16px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }

  /* 下部: 魚リスト */
  .bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 2;
    padding: 0 72px 80px;
  }

  .fish-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 36px;
  }
  .fish-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px 28px;
  }
  .fish-row .name {
    font-size: 32px;
    font-weight: 900;
  }
  .fish-row .method {
    font-size: 20px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }
  .fish-row .status {
    font-size: 22px;
    font-weight: 900;
    padding: 8px 20px;
    border-radius: 10px;
  }
  .status.hot {
    background: rgba(239,68,68,0.25);
    color: #fca5a5;
    border: 1px solid rgba(239,68,68,0.3);
  }
  .status.good {
    background: rgba(74,222,128,0.2);
    color: #4ade80;
    border: 1px solid rgba(74,222,128,0.3);
  }
  .status.ending {
    background: rgba(251,191,36,0.2);
    color: #fbbf24;
    border: 1px solid rgba(251,191,36,0.3);
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-icon {
    width: 44px;
    height: 44px;
    background: #0ea5e9;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 900;
  }
  .brand-name { font-size: 22px; font-weight: 900; }
  .brand-url { font-size: 16px; color: rgba(255,255,255,0.5); }
  .brand-cta { font-size: 20px; color: rgba(255,255,255,0.4); font-weight: 700; }
</style>
</head>
<body>
  <div class="photo-bg"></div>
  <div class="gradient-overlay"></div>
  <div class="grain"></div>

  <div class="top">
    <div class="hook">
      3月、<br>
      <span class="em">狙うべき</span><br>
      魚はこれ。
    </div>
    <div class="hook-sub">今月の旬 × ベストな釣り方</div>
  </div>

  <div class="bottom">
    <div class="fish-list">
      <div class="fish-row">
        <div>
          <div class="name">チヌ（クロダイ）</div>
          <div class="method">フカセ釣り・エビ撒き</div>
        </div>
        <div class="status hot">🔥 激アツ</div>
      </div>
      <div class="fish-row">
        <div>
          <div class="name">メバル</div>
          <div class="method">メバリング・探り釣り</div>
        </div>
        <div class="status good">最盛期</div>
      </div>
      <div class="fish-row">
        <div>
          <div class="name">カレイ</div>
          <div class="method">投げ釣り</div>
        </div>
        <div class="status ending">ラスト</div>
      </div>
    </div>

    <div class="brand">
      <div class="brand-left">
        <div class="brand-icon">釣</div>
        <div>
          <div class="brand-name">ツリスポ</div>
          <div class="brand-url">tsurispot.com</div>
        </div>
      </div>
      <div class="brand-cta">→ 魚図鑑チェック</div>
    </div>
  </div>
</body>
</html>
