<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>デモリール プレビュー</title>
<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: sans-serif;
    color: white;
  }
  .container {
    text-align: center;
  }
  h1 {
    font-size: 24px;
    margin-bottom: 20px;
    color: #888;
  }
  video {
    width: 360px;
    height: 640px;
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
  .info {
    margin-top: 16px;
    color: #666;
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>ツリスポ Instagram リール デモ</h1>
    <video src="demo-reel.mp4" controls autoplay loop muted></video>
    <div class="info">1080x1920 / 30fps / 15秒 / 3.9MB</div>
  </div>
</body>
</html>
