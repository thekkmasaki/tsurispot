name: IndexNow 週次全量 ping

# サイト全 URL (7,000+) を Bing/Yandex に IndexNow で通知する週次バッチ。
# デプロイ毎の全量 ping は全量再クロールを誘発しオリジン負荷／コストの一因になるため、
# 通常デプロイ（deploy.yml）は重要ページのみを通知し、全量通知はここに分離した。
# トラフィック最少時間帯（日曜 02:00 JST）に週1回だけ実行する。
on:
  schedule:
    - cron: '0 17 * * 6'   # 土 17:00 UTC = 日 02:00 JST（トラフィック最少）
  workflow_dispatch: {}    # 手動実行も可

jobs:
  indexnow-full:
    runs-on: ubuntu-latest
    steps:
      # 全 URL 収集＋バッチ送信は時間がかかるため上限を長めに取る。
      # 失敗してもリトライは翌週の cron に任せる（continue-on-error）。
      - name: IndexNow full ping (全 URL 通知)
        continue-on-error: true
        run: |
          echo "Triggering IndexNow full ping for all URLs..."
          RESPONSE=$(curl -sS --max-time 300 "https://tsurispot.com/api/indexnow?full=true")
          echo "Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "IndexNow full ping succeeded."
          else
            echo "::warning::IndexNow full ping failed or returned non-success response"
          fi

      - name: Discord通知（成功）
        if: success() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\":\"✅ **IndexNow 週次全量 ping** 実行しました\"}" \
            "$DISCORD_WEBHOOK_URL"

      - name: Discord通知（失敗）
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\":\"❌ **IndexNow 週次全量 ping** 失敗\\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL"
