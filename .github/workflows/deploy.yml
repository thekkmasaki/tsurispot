name: Deploy to App Runner

on:
  push:
    branches: [master, refactor/split-large-files]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.company/**'
      - 'memory/**'
      - 'blog-drafts/**'
      - 'scripts/weekly-reports/**'
      - 'sns-videos/**'
      - 'photo/**'
      - 'insta/**'
      - '**/*.mov'
      - '**/*.mp4'
      - '**/*.png'
      - '**/*.jpg'

concurrency:
  group: deploy-apprunner
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: tsurispot
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:ap-northeast-1:179503922406:service/tsurispot/5a8d55c727a94c029c2666e7fc3b5108

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Lint
        run: npx eslint src/
      - name: Run tests
        run: npm run test:run

      # Next.jsビルドキャッシュ（.next/cache）を復元
      - name: Restore Next.js build cache
        if: github.ref == 'refs/heads/master'
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-build-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            nextjs-build-${{ hashFiles('package-lock.json') }}-
            nextjs-build-

      # Next.jsビルドをDocker外で実行（キャッシュ活用で高速化）
      - name: Build Next.js
        if: github.ref == 'refs/heads/master'
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_LINE_ADD_FRIEND_URL: ${{ secrets.NEXT_PUBLIC_LINE_ADD_FRIEND_URL }}
          NEXT_PUBLIC_ADSENSE_ID: ${{ secrets.NEXT_PUBLIC_ADSENSE_ID }}
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}

      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/master'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: github.ref == 'refs/heads/master'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/master'
        uses: docker/setup-buildx-action@v3

      # Dockerはpre-built成果物をCOPYするだけ（npm ci/next build不要）
      - name: Build and push Docker image
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Wait for App Runner to be RUNNING
        if: github.ref == 'refs/heads/master'
        run: |
          echo "Checking App Runner status before deployment..."
          for i in $(seq 1 20); do
            STATUS=$(aws apprunner describe-service \
              --service-arn ${{ env.APP_RUNNER_SERVICE_ARN }} \
              --query "Service.Status" --output text)
            echo "Attempt $i: Status = $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "App Runner is ready for deployment."
              exit 0
            fi
            echo "Waiting for previous deployment to finish..."
            sleep 15
          done
          echo "::error::App Runner is still not RUNNING after 5 minutes. Aborting."
          exit 1

      - name: Deploy to App Runner
        if: github.ref == 'refs/heads/master'
        run: |
          aws apprunner start-deployment \
            --service-arn ${{ env.APP_RUNNER_SERVICE_ARN }}

      - name: Wait for deployment
        if: github.ref == 'refs/heads/master'
        run: |
          echo "Deployment started. Waiting for App Runner to update..."
          PREV_STATUS=""
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn ${{ env.APP_RUNNER_SERVICE_ARN }} \
              --query "Service.Status" --output text)
            echo "Attempt $i: Status = $STATUS"

            # ROLLBACK検出: 前回OPERATION_IN_PROGRESSで今回RUNNINGならROLLBACK
            if [ "$STATUS" = "RUNNING" ] && [ "$PREV_STATUS" = "OPERATION_IN_PROGRESS" ]; then
              # 最新オペレーションを確認
              OP_STATUS=$(aws apprunner list-operations \
                --service-arn ${{ env.APP_RUNNER_SERVICE_ARN }} \
                --query "OperationSummaryList[0].Status" --output text 2>/dev/null || echo "UNKNOWN")
              echo "Latest operation status: $OP_STATUS"
              if [ "$OP_STATUS" = "ROLLBACK_SUCCEEDED" ] || [ "$OP_STATUS" = "ROLLBACK_FAILED" ]; then
                echo "::error::Deployment ROLLED BACK! Status: $OP_STATUS"
                exit 1
              fi
              echo "Deployment complete!"
              exit 0
            fi

            if [ "$STATUS" = "RUNNING" ] && [ -z "$PREV_STATUS" ]; then
              # 初回チェックでRUNNING = デプロイが既に完了（高速デプロイ時）
              # 念のためオペレーション確認
              OP_STATUS=$(aws apprunner list-operations \
                --service-arn ${{ env.APP_RUNNER_SERVICE_ARN }} \
                --query "OperationSummaryList[0].Status" --output text 2>/dev/null || echo "UNKNOWN")
              echo "Latest operation status: $OP_STATUS"
              if [ "$OP_STATUS" = "ROLLBACK_SUCCEEDED" ] || [ "$OP_STATUS" = "ROLLBACK_FAILED" ]; then
                echo "::error::Deployment ROLLED BACK! Status: $OP_STATUS"
                exit 1
              fi
              if [ "$OP_STATUS" = "SUCCEEDED" ]; then
                echo "Deployment complete!"
                exit 0
              fi
            fi

            PREV_STATUS="$STATUS"
            sleep 15
          done
          echo "::error::Deployment timed out after 7.5 minutes"
          exit 1

      - name: Invalidate CloudFront cache
        if: github.ref == 'refs/heads/master'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E366L8IETD0MRP \
            --paths "/*"
          echo "CloudFront cache invalidation started"

      - name: IndexNow 通知（重要ページのみ）
        if: success() && github.ref == 'refs/heads/master'
        run: |
          curl -X GET "https://tsurispot.com/api/indexnow" \
            -H "User-Agent: GitHub Actions/tsurispot-deploy" \
            --max-time 30 || echo "IndexNow notify failed (non-fatal)"

      - name: デプロイ後ヘルスチェック
        if: success() && github.ref == 'refs/heads/master'
        run: |
          echo "Running post-deploy health checks..."
          FAILED=0
          URLS=(
            "https://tsurispot.com/api/health"
            "https://tsurispot.com"
            "https://tsurispot.com/spots"
            "https://tsurispot.com/fish"
            "https://tsurispot.com/prefectures"
            "https://tsurispot.com/blog"
            "https://tsurispot.com/guides"
            "https://tsurispot.com/sitemap.xml"
          )
          for URL in "${URLS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "✅ $URL → $STATUS"
            else
              echo "❌ $URL → $STATUS"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::$FAILED ページでヘルスチェック失敗"
          else
            echo "All health checks passed!"
          fi

      - name: Discord通知（成功）
        if: success() && github.ref == 'refs/heads/master'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -H "Content-Type: application/json" -d "{\"content\":\"✅ **デプロイ成功** \`${{ github.event.head_commit.message }}\`\\nhttps://tsurispot.com\"}" "$DISCORD_WEBHOOK_URL"
          fi

      - name: Discord通知（失敗）
        if: failure() && github.ref == 'refs/heads/master'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -H "Content-Type: application/json" -d "{\"content\":\"❌ **デプロイ失敗** \`${{ github.event.head_commit.message }}\`\\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" "$DISCORD_WEBHOOK_URL"
          fi
