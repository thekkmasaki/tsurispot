name: Deploy to App Runner

on:
  push:
    branches: [master, refactor/split-large-files]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.company/**'
      - 'memory/**'

concurrency:
  group: deploy-apprunner
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: tsurispot
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:ap-northeast-1:179503922406:service/tsurispot/5a8d55c727a94c029c2666e7fc3b5108

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Lint
        run: npx eslint src/
      - name: Run tests
        run: npm run test:run

      # Next.jsビルドキャッシュ（.next/cache）を復元
      - name: Restore Next.js build cache
        if: github.ref == 'refs/heads/master'
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-build-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            nextjs-build-${{ hashFiles('package-lock.json') }}-
            nextjs-build-

      # Next.jsビルドをDocker外で実行（キャッシュ活用で高速化）
      - name: Build Next.js
        if: github.ref == 'refs/heads/master'
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_LINE_ADD_FRIEND_URL: ${{ secrets.NEXT_PUBLIC_LINE_ADD_FRIEND_URL }}
          NEXT_PUBLIC_ADSENSE_ID: ${{ secrets.NEXT_PUBLIC_ADSENSE_ID }}
          # AdSense 枠別スロットID（未設定の枠は ads-config.ts が既存3スロットに自動フォールバック）
          NEXT_PUBLIC_AD_SLOT_IN_ARTICLE: ${{ secrets.NEXT_PUBLIC_AD_SLOT_IN_ARTICLE }}
          NEXT_PUBLIC_AD_SLOT_DISPLAY: ${{ secrets.NEXT_PUBLIC_AD_SLOT_DISPLAY }}
          NEXT_PUBLIC_AD_SLOT_NATIVE_BREAK: ${{ secrets.NEXT_PUBLIC_AD_SLOT_NATIVE_BREAK }}
          NEXT_PUBLIC_AD_SLOT_MULTIPLEX: ${{ secrets.NEXT_PUBLIC_AD_SLOT_MULTIPLEX }}
          NEXT_PUBLIC_AD_SLOT_PRE_FOOTER: ${{ secrets.NEXT_PUBLIC_AD_SLOT_PRE_FOOTER }}
          NEXT_PUBLIC_AD_SLOT_SIDEBAR: ${{ secrets.NEXT_PUBLIC_AD_SLOT_SIDEBAR }}
          NEXT_PUBLIC_AD_SLOT_SIDEBAR_STICKY: ${{ secrets.NEXT_PUBLIC_AD_SLOT_SIDEBAR_STICKY }}
          NEXT_PUBLIC_AD_SLOT_HEADER_BANNER: ${{ secrets.NEXT_PUBLIC_AD_SLOT_HEADER_BANNER }}
          NEXT_PUBLIC_AD_SLOT_SIDE_RAIL: ${{ secrets.NEXT_PUBLIC_AD_SLOT_SIDE_RAIL }}
          NEXT_PUBLIC_AD_SLOT_IN_FEED: ${{ secrets.NEXT_PUBLIC_AD_SLOT_IN_FEED }}
          NEXT_PUBLIC_AD_SLOT_PARALLEL: ${{ secrets.NEXT_PUBLIC_AD_SLOT_PARALLEL }}
          NEXT_PUBLIC_AD_SLOT_MOBILE_STICKY: ${{ secrets.NEXT_PUBLIC_AD_SLOT_MOBILE_STICKY }}
          NEXT_PUBLIC_AD_SLOT_MOBILE_HEADER_BANNER: ${{ secrets.NEXT_PUBLIC_AD_SLOT_MOBILE_HEADER_BANNER }}
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-northeast-1
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}

      # フォントpreloadハッシュ検証（layout.tsx のハードコードとビルド成果物の一致）
      # LCP対策で layout.tsx に Zen Maru 700 スライス4本を <link rel=preload> でハードコードしている。
      # next/font のハッシュは通常ビルド間で安定だが、Zen Maru 更新や Next.js 更新でずれると
      # preload が 404(無害・コンソール警告のみ)になり LCP 改善が失効する。ここで検出する。
      # ずれても表示は壊れないため FAIL させず warning に留め、コンテンツ系デプロイをブロックしない。
      - name: フォントpreloadハッシュ検証
        if: github.ref == 'refs/heads/master'
        run: |
          MISS=0
          for f in f99f0c0793f80098-s.f3844250.woff2 27e35131747c32ae-s.b6c80edf.woff2 \
                   4aa59075740ea887-s.56094210.woff2 918bec1d53fbfd5a-s.040320a2.woff2; do
            if [ -f ".next/static/media/$f" ]; then
              echo "OK  preload対象 $f が成果物に存在"
            else
              echo "::warning::preload対象 $f がビルド成果物に無い（Zen Maru/Next更新でハッシュずれ?）。src/app/layout.tsx の preload href を .next/static/media の実ファイル名に更新するとLCP改善が復活する（表示は壊れていない）"
              MISS=1
            fi
          done
          [ "$MISS" = "0" ] && echo "フォントpreload 4本すべて成果物に存在" || true

      # ビルド成果物サイズ計測（情報・内訳）
      # 非圧縮の .next/standalone は実デプロイ可否(=App Runner が pull する圧縮イメージ容量)と
      # 直結しないため、ここでは FAIL させず「どのルートが肥大しているか」の内訳ログのみ出す。
      # 実際の起動不能ガードは Docker push 後の「イメージ容量ガード（ECR圧縮サイズ）」が担う。
      - name: ビルド成果物サイズ計測（情報・内訳）
        if: github.ref == 'refs/heads/master'
        run: |
          STANDALONE_KB=$(du -sk .next/standalone 2>/dev/null | cut -f1 || echo 0)
          STATIC_KB=$(du -sk .next/static 2>/dev/null | cut -f1 || echo 0)
          PUBLIC_KB=$(du -sk public 2>/dev/null | cut -f1 || echo 0)
          TOTAL_MB=$(( (STANDALONE_KB + STATIC_KB + PUBLIC_KB) / 1024 ))
          echo "ビルド成果物サイズ(非圧縮): ${TOTAL_MB} MB (standalone $((STANDALONE_KB/1024))MB / static $((STATIC_KB/1024))MB / public $((PUBLIC_KB/1024))MB)"
          echo "--- .next/server/app 内訳（上位20）---"
          du -h .next/standalone/.next/server/app 2>/dev/null | sort -rh | head -20 || true

      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/master'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: github.ref == 'refs/heads/master'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/master'
        uses: docker/setup-buildx-action@v3

      # Dockerはpre-built成果物をCOPYするだけ（npm ci/next build不要）
      - name: Build and push Docker image
        if: github.ref == 'refs/heads/master'
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # イメージ容量ガード（App Runner 起動不能の再発防止 / 2026-05-19 障害対策）
      # push 済みイメージの ECR 圧縮サイズ（= App Runner が実際に pull する容量）で判定する。
      # 過去、全10,919スポット+全件マトリクスSSGで 2.65GB に膨張 → App Runner 起動不能 →
      # 連続ROLLBACK。実績値を基準に FAIL=2400MB / WARN=1800MB。
      # FAIL なら後続の Deploy(update-service) ステップが実行されない → App Runner は旧イメージのまま無傷。
      - name: イメージ容量ガード（ECR圧縮サイズ）
        if: github.ref == 'refs/heads/master'
        run: |
          WARN_MB=1800
          FAIL_MB=2400
          DIGEST="${{ steps.docker-build.outputs.digest }}"
          SIZE_BYTES=$(aws ecr describe-images \
            --repository-name "${{ env.ECR_REPOSITORY }}" \
            --image-ids imageDigest="$DIGEST" \
            --query 'imageDetails[0].imageSizeInBytes' --output text 2>/dev/null || echo "")
          if [ -z "$SIZE_BYTES" ] || [ "$SIZE_BYTES" = "None" ]; then
            echo "::warning::ECR イメージサイズを取得できませんでした（digest=$DIGEST）。容量ガードをスキップしてデプロイ続行。"
            exit 0
          fi
          SIZE_MB=$(( SIZE_BYTES / 1024 / 1024 ))
          echo "ECR圧縮イメージサイズ: ${SIZE_MB} MB (digest=$DIGEST)"
          if [ "$SIZE_MB" -ge "$FAIL_MB" ]; then
            echo "::error::ECRイメージ ${SIZE_MB}MB が上限 ${FAIL_MB}MB を超過。App Runner 起動不能リスク（過去2.65GBで起動失敗）のためデプロイ中止。SSG件数/データ量を見直してください。App Runner は旧イメージのまま無傷です。"
            exit 1
          fi
          if [ "$SIZE_MB" -ge "$WARN_MB" ]; then
            echo "::warning::ECRイメージ ${SIZE_MB}MB が警告閾値 ${WARN_MB}MB を超過。容量推移を注視してください。"
          fi
          echo "容量ガード通過 (${SIZE_MB}MB < ${FAIL_MB}MB)"

      - name: Wait for App Runner to be RUNNING
        if: github.ref == 'refs/heads/master'
        run: |
          echo "Checking App Runner status before deployment..."
          for i in $(seq 1 20); do
            STATUS=$(aws apprunner describe-service \
              --service-arn ${{ env.APP_RUNNER_SERVICE_ARN }} \
              --query "Service.Status" --output text)
            echo "Attempt $i: Status = $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "App Runner is ready for deployment."
              exit 0
            fi
            echo "Waiting for previous deployment to finish..."
            sleep 15
          done
          echo "::error::App Runner is still not RUNNING after 5 minutes. Aborting."
          exit 1

      - name: Deploy to App Runner
        if: github.ref == 'refs/heads/master'
        run: |
          # docker/build-push-action が push した新 image の digest を直接取得（race-condition なし）
          DIGEST="${{ steps.docker-build.outputs.digest }}"
          echo "New image digest: $DIGEST"

          # App Runner の現状 SourceConfiguration を保持しつつ ImageIdentifier だけ差し替え。
          # start-deployment だけでは古い digest を pull し続けるため、必ず update-service で
          # 新 digest を ImageIdentifier に書き込む。
          NEW_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${DIGEST}"
          aws apprunner describe-service \
            --service-arn ${{ env.APP_RUNNER_SERVICE_ARN }} \
            --query "Service.SourceConfiguration" > /tmp/source-config.json
          jq --arg img "$NEW_IMAGE" '.ImageRepository.ImageIdentifier = $img' /tmp/source-config.json > /tmp/source-config-new.json

          echo "Calling update-service with new image: $NEW_IMAGE"
          aws apprunner update-service \
            --service-arn ${{ env.APP_RUNNER_SERVICE_ARN }} \
            --source-configuration file:///tmp/source-config-new.json

      - name: Wait for deployment
        if: github.ref == 'refs/heads/master'
        run: |
          echo "Deployment started. Waiting for App Runner to update..."
          PREV_STATUS=""
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn ${{ env.APP_RUNNER_SERVICE_ARN }} \
              --query "Service.Status" --output text)
            echo "Attempt $i: Status = $STATUS"

            # ROLLBACK検出: 前回OPERATION_IN_PROGRESSで今回RUNNINGならROLLBACK
            if [ "$STATUS" = "RUNNING" ] && [ "$PREV_STATUS" = "OPERATION_IN_PROGRESS" ]; then
              # 最新オペレーションを確認
              OP_STATUS=$(aws apprunner list-operations \
                --service-arn ${{ env.APP_RUNNER_SERVICE_ARN }} \
                --query "OperationSummaryList[0].Status" --output text 2>/dev/null || echo "UNKNOWN")
              echo "Latest operation status: $OP_STATUS"
              if [ "$OP_STATUS" = "ROLLBACK_SUCCEEDED" ] || [ "$OP_STATUS" = "ROLLBACK_FAILED" ]; then
                echo "::error::Deployment ROLLED BACK! Status: $OP_STATUS"
                exit 1
              fi
              echo "Deployment complete!"
              exit 0
            fi

            if [ "$STATUS" = "RUNNING" ] && [ -z "$PREV_STATUS" ]; then
              # 初回チェックでRUNNING = デプロイが既に完了（高速デプロイ時）
              # 念のためオペレーション確認
              OP_STATUS=$(aws apprunner list-operations \
                --service-arn ${{ env.APP_RUNNER_SERVICE_ARN }} \
                --query "OperationSummaryList[0].Status" --output text 2>/dev/null || echo "UNKNOWN")
              echo "Latest operation status: $OP_STATUS"
              if [ "$OP_STATUS" = "ROLLBACK_SUCCEEDED" ] || [ "$OP_STATUS" = "ROLLBACK_FAILED" ]; then
                echo "::error::Deployment ROLLED BACK! Status: $OP_STATUS"
                exit 1
              fi
              if [ "$OP_STATUS" = "SUCCEEDED" ]; then
                echo "Deployment complete!"
                exit 0
              fi
            fi

            PREV_STATUS="$STATUS"
            sleep 15
          done
          echo "::error::Deployment timed out after 7.5 minutes"
          exit 1

      # Cloudflare キャッシュ purge（限定purge）。
      # 本番 DNS は Cloudflare に移行済みで CloudFront はバイパス（アイドル）。
      # 【2026-06-23 障害対策】以前は purge_everything で全HTML+全エッジを消去していたが、
      # deploy 直後に Cloudflare も Redis ISR(buildID名前空間) も空になり、オリジンが約7,600ページを
      # 一斉に同期冷生成 → 1 vCPU が CPU100% 飽和 → 125s タイムアウト → 502 の嵐（本番ダウン）に
      # なっていた。対策として、サイト全体に影響する「ハブ/インデックスページ」だけを限定 purge する。
      # 長尾の詳細ページ(spot/fish/prefecture/blog 詳細)はエッジに残し、stale-while-revalidate により
      # アクセス毎に裏側で1回ずつ再検証 → 同期冷生成の殺到を回避（trade-off: 詳細ページの内容反映は
      # 最大 s-maxage(1h)+次アクセスまで遅延。ハブと sitemap は即時 purge され新規ページ導線は維持）。
      # 静的アセットは hash 付き immutable URL なので purge しない（残すことで stale HTML とも整合）。
      # CF_API_TOKEN / CF_ZONE_ID 未設定時は skip（段階導入のため非致命）。
      - name: Cloudflare cache purge (限定purge)
        if: github.ref == 'refs/heads/master'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "::warning::CF_API_TOKEN / CF_ZONE_ID 未設定のため Cloudflare purge を skip しました。"
            exit 0
          fi
          # サイト全体に影響するハブ/インデックスページのみ purge（長尾詳細は SWR に委ねる）
          resp=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://tsurispot.com/","https://tsurispot.com/spots","https://tsurispot.com/fish","https://tsurispot.com/blog","https://tsurispot.com/catchable-now","https://tsurispot.com/prefecture","https://tsurispot.com/monthly","https://tsurispot.com/sitemap.xml"]}')
          echo "$resp"
          echo "$resp" | grep -q '"success":true' || {
            echo "::error::Cloudflare purge failed"; exit 1;
          }
          echo "Cloudflare cache purged (targeted hub pages)."

      # デプロイ後ウォームアップ（コールド ISR 生成を完了させてキャッシュ投入）。
      # 直前の限定purgeでハブページのエッジが空 → トップ等は次の1アクセスで同期再生成される。
      # 既存ヘルスチェックは --max-time 30 のため、重いページ(過去トップ53s)が生成完了前に放棄され
      # 温まらず、最初の実ユーザー/Googlebot が冷えたページを踏んでいた。ここで十分なタイムアウト(90s)で
      # 代表ページを叩き生成を完了させ、Next/Redis + Cloudflare を温める。非致命（警告のみ・デプロイ継続）。
      - name: デプロイ後ウォームアップ
        if: success() && github.ref == 'refs/heads/master'
        run: |
          echo "Warming caches after purge..."
          WARM_URLS=(
            "https://tsurispot.com/"
            "https://tsurispot.com/blog"
            "https://tsurispot.com/catchable-now"
            "https://tsurispot.com/fish"
          )
          # 1回目: コールド生成を完了させる（十分なタイムアウト）
          for URL in "${WARM_URLS[@]}"; do
            T=$(curl -s -o /dev/null -w "%{time_starttransfer}" --max-time 90 "$URL" || echo "timeout")
            echo "warmed  $URL (TTFB=${T}s)"
          done
          # 2回目: キャッシュHITで高速化したことを確認（温まり検証）
          for URL in "${WARM_URLS[@]}"; do
            T=$(curl -s -o /dev/null -w "%{time_starttransfer}" --max-time 30 "$URL" || echo "still-cold")
            echo "verify  $URL (TTFB=${T}s)"
          done

      - name: デプロイ後ヘルスチェック
        if: success() && github.ref == 'refs/heads/master'
        run: |
          echo "Running post-deploy health checks..."
          FAILED=0
          # この時点で App Runner は既に RUNNING・本番反映済み。これはデプロイ後の smoke check。
          # Cloudflare purge 直後の ISR コールド生成で時間がかかるページ(/blog, /sitemap.xml 等)があるため、
          # タイムアウトはデプロイを止めず警告に留める。curl 失敗(exit 28 等)が set -e でステップ全体を
          # 落とさないよう `|| echo "000"` で握りつぶす。4xx/5xx の実エラーのみ ❌ として集計する。
          URLS=(
            "https://tsurispot.com/api/health"
            "https://tsurispot.com"
            "https://tsurispot.com/spots"
            "https://tsurispot.com/fish"
            "https://tsurispot.com/prefecture"
            "https://tsurispot.com/blog"
            "https://tsurispot.com/monthly"
            "https://tsurispot.com/sitemap.xml"
          )
          for URL in "${URLS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "✅ $URL → $STATUS"
            elif [ "$STATUS" = "000" ]; then
              echo "⚠️  $URL → タイムアウト(>30s) — ISRコールド生成中の可能性。警告のみ"
            else
              echo "❌ $URL → $STATUS"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::$FAILED ページが 4xx/5xx を返しました（要確認・デプロイは継続）"
          else
            echo "All health checks passed!"
          fi

      # 本番 indexability 検証（GSC「noindexで除外/検証に失敗しました」の再発検出）。
      # Cloudflare purge 後に代表URLを取得し、meta robots / X-Robots-Tag に noindex が
      # 付いていないことを確認する。逆に /mypage は noindex であるべき（ネガティブコントロール）。
      # キャッシュ起因の noindex 残存（GSC検証失敗の主因）を直接検出するのが目的。
      # 誤検出やコールド生成でデプロイを止めないよう WARN のみ（デプロイは継続）。
      - name: 本番 indexability チェック
        if: success() && github.ref == 'refs/heads/master'
        run: |
          echo "Checking indexability (noindex regression detection)..."
          check_index() {
            URL="$1"; EXPECT="$2"
            BODY=$(curl -sS --max-time 30 "$URL" 2>/dev/null || echo "")
            HDR=$(curl -sS -I --max-time 30 "$URL" 2>/dev/null || echo "")
            HAS_NOINDEX=0
            echo "$BODY" | grep -iqE 'name="robots"[^>]*noindex' && HAS_NOINDEX=1
            echo "$HDR" | grep -iqE 'x-robots-tag:[^\r\n]*noindex' && HAS_NOINDEX=1
            if [ "$EXPECT" = "index" ] && [ "$HAS_NOINDEX" = "1" ]; then
              echo "::warning::$URL が noindex を返しています（インデックスされるべきページ／キャッシュ残存を疑う）"
            elif [ "$EXPECT" = "noindex" ] && [ "$HAS_NOINDEX" = "0" ]; then
              echo "::warning::$URL に noindex が付いていません（noindex であるべきページ）"
            else
              echo "✅ $URL ($EXPECT 期待どおり)"
            fi
          }
          check_index "https://tsurispot.com/" index
          check_index "https://tsurispot.com/spots" index
          check_index "https://tsurispot.com/fish" index
          check_index "https://tsurispot.com/blog" index
          check_index "https://tsurispot.com/prefecture" index
          check_index "https://tsurispot.com/mypage" noindex
          echo "Indexability check done."

      # Bing/Yandex に新規 deploy 内容を IndexNow で即時通知。
      # `?full=true` で全 URL (7,000+) を一括 ping。健康チェック後・通知前に実行。
      # 失敗してもデプロイ自体は成功扱い (continue-on-error)。
      - name: IndexNow auto ping (Bing/Yandex)
        if: success() && github.ref == 'refs/heads/master'
        continue-on-error: true
        run: |
          echo "Triggering IndexNow ping for all URLs..."
          RESPONSE=$(curl -sS --max-time 180 "https://tsurispot.com/api/indexnow?full=true")
          echo "Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "IndexNow ping succeeded."
          else
            echo "::warning::IndexNow ping failed or returned non-success response"
          fi

      - name: Discord通知（成功）
        if: success() && github.ref == 'refs/heads/master'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -H "Content-Type: application/json" -d "{\"content\":\"✅ **デプロイ成功** \`${{ github.event.head_commit.message }}\`\\nhttps://tsurispot.com\"}" "$DISCORD_WEBHOOK_URL"
          fi

      - name: Discord通知（失敗）
        if: failure() && github.ref == 'refs/heads/master'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -H "Content-Type: application/json" -d "{\"content\":\"❌ **デプロイ失敗** \`${{ github.event.head_commit.message }}\`\\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" "$DISCORD_WEBHOOK_URL"
          fi
