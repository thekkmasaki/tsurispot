name: Deploy to App Runner

on:
  push:
    branches: [master]

concurrency:
  group: deploy-apprunner
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: tsurispot
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:ap-northeast-1:179503922406:service/tsurispot/5a8d55c727a94c029c2666e7fc3b5108

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Lint
        run: npx eslint src/
      - name: Run tests
        run: npm run test:run

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }} \
            --build-arg NEXT_PUBLIC_LINE_ADD_FRIEND_URL=${{ secrets.NEXT_PUBLIC_LINE_ADD_FRIEND_URL }} \
            --build-arg MICROCMS_SERVICE_DOMAIN=${{ secrets.MICROCMS_SERVICE_DOMAIN }} \
            --build-arg MICROCMS_API_KEY=${{ secrets.MICROCMS_API_KEY }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Wait for App Runner to be RUNNING
        run: |
          echo "Checking App Runner status before deployment..."
          for i in $(seq 1 20); do
            STATUS=$(aws apprunner describe-service \
              --service-arn ${{ env.APP_RUNNER_SERVICE_ARN }} \
              --query "Service.Status" --output text)
            echo "Attempt $i: Status = $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "App Runner is ready for deployment."
              exit 0
            fi
            echo "Waiting 30s for previous deployment to finish..."
            sleep 30
          done
          echo "::error::App Runner is still not RUNNING after 10 minutes. Aborting."
          exit 1

      - name: Deploy to App Runner
        run: |
          aws apprunner start-deployment \
            --service-arn ${{ env.APP_RUNNER_SERVICE_ARN }}

      - name: Wait for deployment
        run: |
          echo "Deployment started. Waiting for App Runner to update..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn ${{ env.APP_RUNNER_SERVICE_ARN }} \
              --query "Service.Status" --output text)
            echo "Status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "Deployment complete!"
              exit 0
            fi
            sleep 30
          done
          echo "Deployment timed out"
          exit 1

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E366L8IETD0MRP \
            --paths "/*"
          echo "CloudFront cache invalidation started"

      - name: Discord通知（成功）
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -H "Content-Type: application/json" -d "{\"content\":\"✅ **デプロイ成功** \`${{ github.event.head_commit.message }}\`\\nhttps://tsurispot.com\"}" "$DISCORD_WEBHOOK_URL"
          fi

      - name: Discord通知（失敗）
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -H "Content-Type: application/json" -d "{\"content\":\"❌ **デプロイ失敗** \`${{ github.event.head_commit.message }}\`\\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" "$DISCORD_WEBHOOK_URL"
          fi
